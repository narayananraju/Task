<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .section-1 {
            width: 400px;
            background: white;
            border-radius: 9px;
            overflow: hidden;
            box-shadow: 0 9px 23px rgba(0, 0, 0, 0.2);
            height:100%;
            border:1px solid black;
        }

        .chapter-1 {
            position: relative;
        }

        .chapter-1 img {
            width: 100%;
            display: block;
        }

        .portion-1 {
            position: absolute;
            top: 15px;
            right: -35px;
            background-color: orangered;
            color: white;
            padding: 6px 38px;
            transform: rotate(45deg);
            font-size: 12px;
            font-weight: bold;
        }
        .chapter-2{
            padding: 23px;
        }
        .portion-2{
            color:#d75959;
            font-size: 13px;
            letter-spacing: 2px;
        }
        h1{
            font-style: italic;
            font-family: sans-serif;
            margin: 10px 0 ;
        }
        .portion-3{
            color: #7c90a7;
            font-size: 15px;
            line-height: 1.4;
        }
        hr{
            border: 1px dashed ;
        }
        .chapter-3{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 23px;
        }
        .chapter-3 img{
            width: 40px;
        }
        .box{
            border:1px solid black;
            padding: 9px;
        }
        .chapter-4{
            display: flex;
            justify-content: space-between;
            background: #d7fdcb;
            padding: 14px;
            margin-top: 20px;
            border-radius: 9px;
        }
        .step p{
          color:rgb(241, 88, 32)
        }
        h3,h1{
            color:rgb(10, 10, 60);
        }
        .portion-4{
            color:#a4a4a4;
        }
         .portion-4 h3{
             color: #a4a4a4;
         }

    </style>
</head>

<body>
    <section class=section-1>

                <div>

</html>
