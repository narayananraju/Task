<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Canyon Card</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .sec-1{
            display: flex;
            width: 1000px;
            height: 490px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        .chapter-1{
            flex: 1;
            background: url(1.jpeg);
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
          
        }
        .main{
            background: rgb(172, 237, 172);
            padding: 8px;
            width: 50%;
              margin-bottom: 14px;

        }
        span{
            border: 1px solid darkgreen;
        }
        .est{
            position: absolute;
            top: 19px;
            left: 19px;
            background: #d76a00;
            color: #fff;
            font-size: 11px;
            padding: 7px 9px;
            border: none;
            font-weight: bold;
        }
        .chapter-2{
            flex: 1;
            padding: 50px;
        }

        .chapter-3{
            color: #e07b00;
            font-size: 13px;
            letter-spacing: 3px;
            margin-bottom: 9px;
            font-weight: bold;
        }
        h1{
            font-size: 46px;
            font-weight: 900;
            color: #1d2430;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        hr{
            border: none;
            border-top: 1px solid #d1cece;
            margin: 20px 0;
        }
        p{
            color: #555;
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 19px;
        }
        .top{
            text-align: right;
            font-size: 13px;
            font-weight: bold;
            color: #1d2430;
            margin-bottom: 23px;
            text-decoration: underline;
        }
        .final button{
            border: 1px solid #ccc;
            background: white;
            padding: 9px 15px;
            margin-right: 9px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .final .final-1{
            background: #1d2430;
            color: white;
            border: none;
        }
        .kit{
            border-radius: 50%;
            margin-right: 9px;
            background-color: green;
            padding: 3px 3px;
            color: white;
        }
        .final button:hover{
            border: 1px solid black;
        }

    </style>
</head>
<body>
    <div class="sec-1">
        <div class="chapter-1">
            <span class="est">EST. 1994</span>
        </div>

        <div class="chapter-2">

            <div class="main">
              <span class="kit">&#10004;</span>OFFICIAL EXPEDITION
            </div>

            <div class="chapter-3">
                NORTH AMERICA / UTAH
            </div>

            <h1>THE GREAT <br> CANYON</h1>

            <hr>
            
            <p> “A vast landscape carved by time itself. This geological marvel
                offers more than just views; it offers a perspective on the
                sheer scale of our planet's history.
            </p>

            <div class="top">GEO MAGAZINE</div>

            <div class="final">
                <button class="final-1">ADVENTURE</button>
                <button>GEOLOGY</button>
                <button>HIKING</button>
            </div>
        </div>
    </div>
</body>
</html>
