<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <style>
        .container-1 {
            background: #fff;
            padding: 50px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 40px;
        }

        .forms{
            display: flex;
            justify-content: space-evenly;
            gap: 30px;
        }

        .forms-part {
            flex: 1;
        }

        h3 {
            font-family: serif;
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
        }

        button {
            margin-left: 100px; 
            padding: 8px 5px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #bbb;
            color: #444;
        }

        button:hover {
            background-color: #e0e0e0;
        }
        span{
        color: red;
        }
    </style>
</head>
<body>
    <div class="container-1">
    <h1>Bit Repository contact form</h1>
    <div class="forms">
        <div class="forms-part">
    <h3>Contact Us</h3>
    <form>
        <div class="forms portion">
        <lable>Name<span>*</span></lable>
        <input type="text">
        </div><br><br>
        <div class="forms portion">
        <lable>E mail<span>*</span></lable>
        <input type="E mail">
        </div><br><br>
        <div class="forms portion">
        <lable>Subject</lable>
        <input type="text">
        </div><br><br>
        <div class="forms portion">
        <lable>Comments<span>*</span></lable>
        <textarea></textarea>
        </div><br><br>
<button type="submit">Send Message</button>
</form>
</div>
<div class="forms-part">
    <h3>What do you think about this website?</h3>
    <form>
        <div class="forms portion">
        <lable>Name<span>*</span></lable>
       <input type="text">
        </div><br><br>
        <div class="forms portion">
        <lable>Opinion<span>*</span></lable>
        <textarea></textarea>
        </div><br><br>
        <button type="submit">Submit</button>
    </form>
</div>
</div>
</div>
</body>
</html>
